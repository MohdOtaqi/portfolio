<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>MedGuard — Sign In</title>
<style>
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html,body{margin:0;width:390px;height:844px;overflow:hidden;}
  body{
    font-family:'Inter',-apple-system,'Segoe UI',Roboto,system-ui,sans-serif;
    color:#1A1A2E;position:relative;
    background:linear-gradient(135deg,#0D7377 0%,#00897B 100%);
  }
  /* ── Status bar ── */
  .statusbar{
    position:absolute;top:0;left:0;right:0;height:44px;z-index:30;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 22px;color:#fff;font-size:14px;font-weight:600;
  }
  .statusbar .icons{display:flex;align-items:center;gap:6px;font-size:13px;}
  .statusbar .bat{border:1.4px solid rgba(255,255,255,.9);border-radius:3px;width:22px;height:11px;position:relative;padding:1px;display:inline-flex;}
  .statusbar .bat::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:rgba(255,255,255,.9);border-radius:0 1px 1px 0;}
  .statusbar .bat i{background:#fff;width:80%;height:100%;border-radius:1px;display:block;}

  /* ── Logo block ── */
  .logo-wrap{padding-top:78px;display:flex;flex-direction:column;align-items:center;}
  .logo{
    width:104px;height:104px;border-radius:50%;background:#fff;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 30px rgba(0,0,0,.18);
  }
  .logo .cross{
    width:56px;height:56px;position:relative;
  }
  .logo .cross::before,.logo .cross::after{
    content:"";position:absolute;background:#0D7377;border-radius:6px;
  }
  .logo .cross::before{left:21px;top:4px;width:14px;height:48px;}
  .logo .cross::after{top:21px;left:4px;height:14px;width:48px;}
  .brand{color:#fff;font-size:34px;font-weight:800;letter-spacing:1px;margin-top:20px;}
  .tag{color:rgba(255,255,255,.82);font-size:14px;margin-top:6px;}

  /* ── Login card ── */
  .card{
    position:absolute;left:0;right:0;bottom:0;
    background:#fff;border-radius:28px 28px 0 0;
    padding:26px 24px 30px;box-shadow:0 -8px 30px rgba(0,0,0,.12);
  }
  .seg{
    display:flex;background:#F0F4F8;border-radius:14px;padding:4px;margin-bottom:22px;
  }
  .seg button{
    flex:1;border:none;background:transparent;padding:10px 0;border-radius:11px;
    font-size:14px;font-weight:700;color:#6B7280;font-family:inherit;letter-spacing:.3px;
  }
  .seg button.active{background:#0D7377;color:#fff;box-shadow:0 2px 6px rgba(13,115,119,.35);}

  .field{margin-bottom:14px;}
  .field .ipt{
    display:flex;align-items:center;gap:10px;
    border:1.5px solid #e5e7eb;border-radius:14px;padding:14px 16px;background:#fff;
  }
  .field .ipt.focus{border-color:#0D7377;border-width:2px;}
  .field .fico{font-size:18px;color:#9aa3af;}
  .field input{
    border:none;outline:none;flex:1;font-size:15px;color:#1A1A2E;font-family:inherit;background:transparent;
  }
  .field input::placeholder{color:#9aa3af;}
  .field .eye{color:#9aa3af;font-size:17px;}

  .forgot{text-align:right;font-size:13px;color:#0D7377;font-weight:600;margin:2px 2px 18px;}

  .login-btn{
    width:100%;border:none;border-radius:14px;padding:16px 0;
    background:#0D7377;color:#fff;font-size:15px;font-weight:700;letter-spacing:.6px;
    box-shadow:0 4px 14px rgba(13,115,119,.4);font-family:inherit;
  }

  /* ── Role hint ── */
  .roles{display:flex;gap:12px;margin-top:20px;}
  .role{
    flex:1;border:1.5px solid #e5e7eb;border-radius:16px;padding:14px 12px;text-align:center;
  }
  .role.sel{border-color:#0D7377;background:rgba(13,115,119,.05);}
  .role .remo{font-size:24px;}
  .role .rname{font-size:13px;font-weight:700;color:#1A1A2E;margin-top:6px;}
  .role .rsub{font-size:11px;color:#6B7280;margin-top:2px;line-height:1.3;}

  .accent-line{height:3px;width:46px;background:#32E0C4;border-radius:2px;margin:18px auto 0;}
</style>
</head>
<body>
  <!-- Status bar -->
  <div class="statusbar">
    <span>9:41</span>
    <span class="icons">
      <span>&#9646;&#9646;&#9646;&#9624;</span>
      <span>&#128246;</span>
      <span class="bat"><i></i></span>
    </span>
  </div>

  <!-- Logo + brand -->
  <div class="logo-wrap">
    <div class="logo"><div class="cross"></div></div>
    <div class="brand">MedGuard</div>
    <div class="tag">Health Monitoring System</div>
  </div>

  <!-- Login card -->
  <div class="card">
    <div class="seg">
      <button class="active">LOG IN</button>
      <button>REGISTER</button>
    </div>

    <div class="field">
      <div class="ipt">
        <span class="fico">&#9993;</span>
        <input type="text" placeholder="Email" value="mohammad@medguard.app" readonly>
      </div>
    </div>

    <div class="field">
      <div class="ipt focus">
        <span class="fico">&#128274;</span>
        <input type="password" placeholder="Password" value="............" readonly>
        <span class="eye">&#128065;</span>
      </div>
    </div>

    <div class="forgot">Forgot password?</div>

    <button class="login-btn">LOG IN</button>

    <!-- Role select -->
    <div class="roles">
      <div class="role sel">
        <div class="remo">&#129505;</div>
        <div class="rname">Care Receiver</div>
        <div class="rsub">Share my vitals</div>
      </div>
      <div class="role">
        <div class="remo">&#128104;&#8205;&#9877;&#65039;</div>
        <div class="rname">Carer</div>
        <div class="rsub">Monitor a loved one</div>
      </div>
    </div>

    <div class="accent-line"></div>
  </div>
</body>
</html>
