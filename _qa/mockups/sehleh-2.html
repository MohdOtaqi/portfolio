<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>Sahleh — Live Tracking</title>
<style>
  :root{
    --green:#10B981; --green-dark:#0F766E; --green-50:#D1FAE5;
    --ink:#0F172A; --muted:#64748B; --soft:#94A3B8;
    --bg:#F8FAFC; --border:#E2E8F0;
    --blue:#3B82F6; --success:#10B981;
    --font:"Outfit","Segoe UI",-apple-system,system-ui,Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  html,body{margin:0;width:390px;height:844px;overflow:hidden;font-family:var(--font);color:var(--ink);}
  .status{position:absolute;top:0;left:0;right:0;z-index:30;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 22px 0 26px;font-size:15px;font-weight:600;color:var(--ink);}
  .status .right{display:flex;align-items:center;gap:6px;font-size:13px;}
  .bat{display:inline-block;width:24px;height:12px;border:1.5px solid var(--ink);border-radius:3px;position:relative;}
  .bat::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:var(--ink);border-radius:0 1px 1px 0;}
  .bat span{position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:70%;background:var(--ink);border-radius:1px;}

  /* ── MAP (CartoDB Voyager-ish light basemap) ── */
  .map{position:absolute;inset:0;
    background:
      linear-gradient(0deg,rgba(0,0,0,.02),rgba(0,0,0,.02)),
      radial-gradient(circle at 30% 20%, #eef4ec 0, #e9eef0 60%);
    overflow:hidden;}
  /* parks / blocks */
  .blk{position:absolute;background:#f7f8f5;border:1px solid #e7eae3;border-radius:6px;}
  .park{position:absolute;background:#dcebd6;border-radius:14px;}
  .water{position:absolute;background:#cfe6ef;border-radius:30px;}
  /* roads */
  .road{position:absolute;background:#ffffff;box-shadow:0 0 0 1px #e4e7e1;}
  .road.major{background:#fdf3d8;box-shadow:0 0 0 1px #efe2b6;}
  .lbl{position:absolute;font-size:10px;color:#9aa4ad;font-weight:600;letter-spacing:.3px;}

  /* route line */
  svg.route{position:absolute;inset:0;width:100%;height:100%;}

  /* markers */
  .cust{position:absolute;left:96px;top:560px;width:60px;height:60px;transform:translate(-50%,-50%);}
  .cust .halo{position:absolute;inset:0;border-radius:50%;background:rgba(59,130,246,.14);}
  .cust .dot{position:absolute;left:50%;top:50%;width:18px;height:18px;transform:translate(-50%,-50%);background:var(--blue);border:3px solid #fff;border-radius:50%;box-shadow:0 0 10px rgba(59,130,246,.5);}
  .prov{position:absolute;left:262px;top:300px;width:48px;height:48px;transform:translate(-50%,-50%) ;}
  .prov .pin{width:48px;height:48px;background:var(--green);border:3px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;transform:rotate(38deg);box-shadow:0 6px 14px rgba(16,185,129,.45);}

  /* back + recenter */
  .back{position:absolute;top:58px;left:16px;z-index:20;width:42px;height:42px;border-radius:50%;background:#fff;box-shadow:0 4px 10px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink);}
  .recenter{position:absolute;right:16px;bottom:330px;z-index:20;width:44px;height:44px;border-radius:50%;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.16);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--green);}

  /* bottom info card */
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:25;background:#fff;border-radius:28px 28px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.08);padding:18px 24px 30px;}
  .grip{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 20px;}
  .prow{display:flex;align-items:center;gap:14px;}
  .pav{width:52px;height:52px;border-radius:16px;background:rgba(16,185,129,.1);display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--green);}
  .pmeta{flex:1;}
  .pmeta .nm{font-size:18px;font-weight:700;}
  .pmeta .sv{font-size:14px;color:var(--muted);margin-top:2px;}
  .eta{background:rgba(16,185,129,.1);color:var(--green);border-radius:12px;padding:8px 14px;font-size:16px;font-weight:700;}
  .stats{display:flex;gap:12px;margin-top:20px;}
  .stat{flex:1;border:1px solid rgba(100,116,139,.12);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:9px;}
  .stat .si{font-size:17px;color:var(--muted);}
  .stat .si.live{color:var(--success);font-size:11px;}
  .stat .sc .v{font-size:14px;font-weight:700;}
  .stat .sc .l{font-size:11px;color:var(--muted);}
  .acts{display:flex;gap:12px;margin-top:16px;}
  .btn{flex:1;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px;font-weight:700;}
  .btn.msg{border:1.5px solid var(--green);color:var(--green);background:#fff;}
  .btn.call{background:var(--green);color:#fff;box-shadow:0 6px 14px rgba(16,185,129,.3);}
</style>
</head>
<body>
  <div class="status">
    <span>9:41</span>
    <span class="right"><span>▮▮▮</span><span>📶</span><span class="bat"><span></span></span></span>
  </div>

  <div class="map">
    <!-- parks & water -->
    <div class="park" style="left:-20px;top:120px;width:140px;height:110px;"></div>
    <div class="park" style="right:-30px;top:430px;width:150px;height:130px;"></div>
    <div class="water" style="left:40px;bottom:-40px;width:200px;height:120px;"></div>
    <!-- blocks -->
    <div class="blk" style="left:30px;top:250px;width:80px;height:60px;"></div>
    <div class="blk" style="left:130px;top:230px;width:90px;height:70px;"></div>
    <div class="blk" style="left:250px;top:160px;width:90px;height:60px;"></div>
    <div class="blk" style="left:160px;top:380px;width:100px;height:80px;"></div>
    <div class="blk" style="left:40px;top:400px;width:90px;height:70px;"></div>
    <div class="blk" style="left:270px;top:420px;width:80px;height:60px;"></div>
    <div class="blk" style="left:120px;top:500px;width:110px;height:60px;"></div>
    <!-- roads -->
    <div class="road major" style="left:0;top:340px;width:390px;height:14px;"></div>
    <div class="road major" style="left:180px;top:80px;width:13px;height:660px;"></div>
    <div class="road" style="left:0;top:230px;width:390px;height:8px;"></div>
    <div class="road" style="left:0;top:480px;width:390px;height:8px;"></div>
    <div class="road" style="left:90px;top:80px;width:7px;height:660px;"></div>
    <div class="road" style="left:300px;top:80px;width:7px;height:660px;"></div>
    <div class="lbl" style="left:40px;top:150px;">Al Abdali</div>
    <div class="lbl" style="left:210px;top:200px;">Shmeisani</div>
    <div class="lbl" style="left:230px;top:510px;">Jabal Amman</div>
    <div class="lbl" style="left:30px;top:520px;">Rainbow St</div>

    <!-- route -->
    <svg class="route" viewBox="0 0 390 844" preserveAspectRatio="none">
      <path d="M262 300 L262 348 L96 348 L96 560"
        fill="none" stroke="#10B981" stroke-width="6" stroke-linecap="round"
        stroke-dasharray="2 14" opacity=".9"/>
      <path d="M262 300 L262 348 L96 348 L96 560"
        fill="none" stroke="#10B981" stroke-width="6" stroke-linecap="round" opacity=".18"/>
    </svg>

    <!-- markers -->
    <div class="prov"><div class="pin">➤</div></div>
    <div class="cust"><div class="halo"></div><div class="dot"></div></div>
  </div>

  <div class="back">‹</div>
  <div class="recenter">◎</div>

  <div class="sheet">
    <div class="grip"></div>
    <div class="prow">
      <div class="pav">👤</div>
      <div class="pmeta">
        <div class="nm">QuickFix Plumbing</div>
        <div class="sv">Emergency Leak Repair</div>
      </div>
      <div class="eta">8 min</div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="si">📏</span>
        <div class="sc"><div class="v">2.4 km</div><div class="l">Distance</div></div>
      </div>
      <div class="stat">
        <span class="si live">●</span>
        <div class="sc"><div class="v">Live</div><div class="l">Status</div></div>
      </div>
    </div>

    <div class="acts">
      <div class="btn msg">💬 Message</div>
      <div class="btn call">📞 Call</div>
    </div>
  </div>
</body>
</html>
